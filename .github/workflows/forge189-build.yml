name: Forge 1.8.9 Build

on:
  push:
    branches:
      - forge-1.8.9
  pull_request:
    branches:
      - forge-1.8.9

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge-1.8.9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle 4.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '4.9'

      - name: Build
        run: gradle build --no-daemon

      - name: Upload Forge JAR
        uses: actions/upload-artifact@v4
        with:
          name: google-chat-forge-1.8.9
          path: forge-1.8.9/build/libs/*.jar
