name: Forge 1.8.9 Release

on:
  push:
    tags:
      - 'forge189-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forge-1.8.9
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle 4.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '4.9'

      - name: Build
        run: gradle build --no-daemon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: forge-1.8.9/build/libs/*.jar
          generate_release_notes: true
          name: Forge 1.8.9 ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
